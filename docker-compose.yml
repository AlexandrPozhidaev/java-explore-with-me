version: '3.8'

services:

  stats-client:
    build:
      context: .
      dockerfile: stat_clnt/Dockerfile
    environment:
      STATS_SERVER_URL: http://stats-server:9090
    depends_on:
      stats-server:
        condition: service_healthy
    networks:
      - stats-net

  stats-server:
    build:
      context: .
      dockerfile: stat_srvc/Dockerfile
    ports:
      - "9090:9090"
    environment:
      SPRING_APPLICATION_NAME: stats-server
      SPRING_DATASOURCE_URL: jdbc:postgresql://stats-db:5432/stats_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_JPA_HIBERNATE_DDL_AUTO: none
      MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: health
    depends_on:
      stats-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9090/actuator/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - stats-net

  stats-db:
    image: postgres:16.1
    environment:
      POSTGRES_DB: stats_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata_stats:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d stats_db"]
      interval: 2s
      timeout: 2s
      retries: 30
    networks:
      - stats-net

volumes:
  pgdata_stats:

networks:
  stats-net:
    driver: bridge
