services:
  ewm-service:
    container_name: ewm-service
    build:
      context: .
      dockerfile: ./ewm-service/Dockerfile
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://main-db:5432/ewm_main
      SPRING_DATASOURCE_USERNAME: ewm_user
      SPRING_DATASOURCE_PASSWORD: ewm_password
      SPRING_JPA_HIBERNATE_DDL_AUTO: none
      SPRING_SQL_INIT_MODE: never
    depends_on:
      main-db:
        condition: service_healthy
    networks:
      - app-net
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  stats-server:
    container_name: stats-server
    build:
      context: .
      dockerfile: ./stat_srvc/Dockerfile
    ports:
      - "9090:9090"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://stats-db:5432/stats
      SPRING_DATASOURCE_USERNAME: stats_user
      SPRING_DATASOURCE_PASSWORD: stats_password
      SPRING_JPA_HIBERNATE_DDL_AUTO: none
      SPRING_SQL_INIT_MODE: never
    depends_on:
      stats-db:
        condition: service_healthy
    networks:
      - app-net
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  main-db:
    container_name: main-db
    image: postgres:16.1
    environment:
      POSTGRES_DB: ewm_main
      POSTGRES_USER: ewm_user
      POSTGRES_PASSWORD: ewm_password
    volumes:
      - main-db-data:/var/lib/postgresql/data
      - ./schema-main.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ewm_user -d ewm_main"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - app-net
    restart: unless-stopped

  stats-db:
    container_name: stats-db
    image: postgres:16.1
    environment:
      POSTGRES_DB: stats
      POSTGRES_USER: stats_user
      POSTGRES_PASSWORD: stats_password
    volumes:
      - stats-db-data:/var/lib/postgresql/data
      - ./schema-stat.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stats_user -d stats"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - app-net
    restart: unless-stopped

volumes:
  main-db-data:
  stats-db-data:

networks:
  app-net:
    driver: bridge
