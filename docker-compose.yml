version: '3.8'

services:
  stats-client:
    build:
      context: ./stat_clnt
      dockerfile: Dockerfile
    environment:
      STATS_SERVER_URL: http://stats-server:9090
    depends_on:
      stats-server:
        condition: service_healthy
    networks:
      - stats-net
    restart: unless-stopped

  stats-server:
    build:
      context: ./stat_srvc
      dockerfile: Dockerfile
    ports:
      - "9090:9090"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://stats-db:5432/stats_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
    depends_on:
      stats-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d stats_db -h stats-db"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - stats-net
    restart: unless-stopped

  stats-db:
    image: postgres:16.1
    container_name: stats-db
    environment:
      POSTGRES_DB: stats_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata_stats:/var/lib/postgresql/data
    networks:
      - stats-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d stats_db"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped

volumes:
  pgdata_stats:
    driver: local

networks:
  stats-net:
    driver: bridge
